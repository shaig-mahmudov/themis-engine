name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: themis_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d themis_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Verify service containers
      run: |
        docker exec "${{ job.services.postgres.id }}" pg_isready -U postgres -d themis_db
        test "$(docker exec "${{ job.services.redis.id }}" redis-cli ping)" = "PONG"

    - name: Build with Maven
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/themis_db
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: test-password
        SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
        SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
        # Keep the full test suite deterministic. Redis availability is checked
        # separately above instead of changing repository test semantics.
        SPRING_CACHE_TYPE: simple
        MANAGEMENT_HEALTH_REDIS_ENABLED: false
        THEMIS_API_KEY: default-dev-key
        THEMIS_CORS_ALLOWED_ORIGINS: http://localhost:3000
        THEMIS_TRUST_FORWARDED_HEADERS: true
      run: chmod +x mvnw && ./mvnw -B clean test

    - name: Upload Surefire reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ github.run_attempt }}
        path: target/surefire-reports/
