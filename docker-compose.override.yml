services:
  postgres-db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

  themis-engine:
    environment:
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      THEMIS_API_KEY: ${THEMIS_API_KEY:?Set THEMIS_API_KEY in .env}
      THEMIS_CORS_ALLOWED_ORIGINS: ${THEMIS_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      THEMIS_TRUST_FORWARDED_HEADERS: ${THEMIS_TRUST_FORWARDED_HEADERS:-false}
      THEMIS_RATE_LIMIT_MAX_CLIENTS: ${THEMIS_RATE_LIMIT_MAX_CLIENTS:-10000}

