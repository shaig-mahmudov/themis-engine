spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
  flyway:
    enabled: true
    clean-disabled: false
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

themis:
  api-key: ${THEMIS_API_KEY:default-dev-key}
  cors:
    allowed-origins: ${THEMIS_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    trust-forwarded-headers: ${THEMIS_TRUST_FORWARDED_HEADERS:true}
    max-clients: ${THEMIS_RATE_LIMIT_MAX_CLIENTS:256}

management:
  health:
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
